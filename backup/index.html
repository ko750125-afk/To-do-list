<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할일</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icons/icon.png">
  <link rel="icon" type="image/png" href="icons/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <style>

    /* ── Design Tokens (shadcn/ui zinc + indigo accent) ──────────────────── */
    :root {
      /* Zinc scale */
      --zinc-50:  #fafafa;
      --zinc-100: #f4f4f5;
      --zinc-200: #e4e4e7;
      --zinc-300: #d4d4d8;
      --zinc-400: #a1a1aa;
      --zinc-500: #71717a;
      --zinc-700: #3f3f46;
      --zinc-900: #18181b;
      --zinc-950: #09090b;

      /* Semantic */
      --background:       #f8fafc;          /* 살짝 시원한 흰색 */
      --surface:          #ffffff;
      --border:           var(--zinc-200);
      --border-strong:    var(--zinc-300);
      --text:             var(--zinc-950);
      --text-sub:         var(--zinc-500);
      --muted-bg:         var(--zinc-100);

      /* Primary (dark — shadcn default) */
      --primary:          var(--zinc-900);
      --primary-fg:       var(--zinc-50);

      /* Accent (indigo — 산뜻한 포인트) */
      --accent:           #6366f1;
      --accent-hover:     #4f46e5;
      --accent-soft:      #eef2ff;

      /* Destructive */
      --danger:           #ef4444;
      --danger-soft:      #fef2f2;

      /* Success */
      --success:          #22c55e;

      /* Radii */
      --r-sm:   0.375rem;   /* 6px */
      --r:      0.5rem;     /* 8px */
      --r-lg:   0.75rem;    /* 12px */
      --r-xl:   1rem;       /* 16px */

      /* Shadows (shadcn sm/md) */
      --shadow-xs: 0 1px 2px 0 rgb(0 0 0 / .04);
      --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / .08), 0 1px 2px -1px rgb(0 0 0 / .06);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / .08), 0 2px 4px -2px rgb(0 0 0 / .05);
      --shadow-drag: 0 16px 40px -4px rgb(0 0 0 / .18), 0 6px 16px -4px rgb(0 0 0 / .10);
    }

    /* ── Reset ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    input, button { font: inherit; }

    /* ── Base ────────────────────────────────────────────────────────────── */
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      color: var(--text);
      background:
        radial-gradient(ellipse 80% 60% at 50% -20%, #e0e7ff44 0%, transparent 70%),
        var(--background);
      min-height: 100vh;
      padding: 28px 16px 96px;
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .container {
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-sm);
      padding: 22px 22px 18px;
      position: relative;
      overflow: hidden;
    }

    /* 상단 인디고 장식선 */
    header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent) 0%, #818cf8 60%, #a5b4fc 100%);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .app-logo {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: var(--r);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgb(99 102 241 / .35);
    }

    header h1 {
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: -0.035em;
      color: var(--text);
    }

    /* Progress */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-track {
      flex: 1;
      height: 6px;
      background: var(--muted-bg);
      border-radius: 999px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #818cf8);
      border-radius: 999px;
      transition: width 0.4s cubic-bezier(.4,0,.2,1), opacity 0.3s ease;
    }
    #progress-bar.complete {
      background: linear-gradient(90deg, #22c55e, #4ade80);
    }

    #progress-text {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sub);
      min-width: 34px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.01em;
    }

    /* ── Input Row ───────────────────────────────────────────────────────── */
    .input-row {
      display: flex;
      gap: 8px;
    }

    #todo-input {
      flex: 1;
      height: 46px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 0 14px;
      font-size: 15px;           /* iOS auto-zoom 방지 */
      color: var(--text);
      outline: none;
      box-shadow: var(--shadow-xs);
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }
    #todo-input::placeholder { color: var(--zinc-400); }
    #todo-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgb(99 102 241 / .14);
    }

    #add-btn {
      height: 46px;
      padding: 0 20px;
      background: var(--primary);
      color: var(--primary-fg);
      border: none;
      border-radius: var(--r-lg);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: -0.01em;
      box-shadow: var(--shadow-xs);
      transition: background 150ms ease, transform 100ms ease, box-shadow 150ms ease;
    }
    #add-btn:hover  { background: var(--zinc-700); }
    #add-btn:active { transform: scale(0.97); }

    /* ── Todo List ───────────────────────────────────────────────────────── */
    #todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Empty State ─────────────────────────────────────────────────────── */
    #empty-state {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 56px 24px;
      text-align: center;
      box-shadow: var(--shadow-xs);
    }
    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
      line-height: 1;
      filter: grayscale(0.15);
    }
    #empty-state p {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-sub);
    }

    /* ── Todo Card ───────────────────────────────────────────────────────── */
    .todo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 13px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow-xs);
      user-select: none;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }
    .todo-card:hover {
      border-color: var(--border-strong);
      box-shadow: var(--shadow-sm);
    }

    /* Drag Handle */
    .drag-handle {
      color: var(--zinc-300);
      font-size: 1rem;
      cursor: grab;
      touch-action: none;
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--r-sm);
      transition: color 150ms ease, background 150ms ease;
    }
    .todo-card:hover .drag-handle,
    .drag-handle:hover { color: var(--zinc-400); background: var(--muted-bg); }
    .drag-handle:active { cursor: grabbing; }

    /* Custom Checkbox (shadcn style) */
    .todo-card input[type="checkbox"] {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--r-sm);
      background: var(--surface);
      cursor: pointer;
      position: relative;
      transition: all 150ms ease;
    }
    .todo-card input[type="checkbox"]:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .todo-card input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .todo-card input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      top: 1.5px;
      left: 5px;
      width: 4.5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    /* Text */
    .todo-text {
      flex: 1;
      font-size: 14.5px;
      font-weight: 450;
      line-height: 1.45;
      word-break: break-word;
      min-width: 0;
      color: var(--text);
      transition: color 200ms ease;
    }
    .todo-card.done .todo-text {
      text-decoration: line-through;
      color: var(--zinc-400);
    }

    /* Card Action Buttons */
    .card-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    @media (hover: hover) {
      .card-actions { opacity: 0; transition: opacity 150ms ease; }
      .todo-card:hover .card-actions { opacity: 1; }
    }

    .card-actions button {
      background: none;
      border: none;
      cursor: pointer;
      width: 30px;
      height: 30px;
      border-radius: var(--r-sm);
      font-size: 13px;
      color: var(--zinc-400);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 150ms ease, transform 100ms ease;
    }
    .card-actions button:active { transform: scale(0.86); }

    .btn-edit:hover {
      color: var(--accent);
      background: var(--accent-soft);
    }
    .btn-delete:hover {
      color: var(--danger);
      background: var(--danger-soft);
    }

    /* ── Drag Placeholder ────────────────────────────────────────────────── */
    .drag-placeholder {
      border: 1.5px dashed var(--zinc-300);
      border-radius: var(--r-lg);
      background: var(--accent-soft);
      list-style: none;
      transition: background 150ms ease;
    }

    /* ── Divider ─────────────────────────────────────────────────────────── */
    .todo-divider {
      display: flex;
      align-items: center;
      padding: 5px 4px;
      cursor: ns-resize;
      list-style: none;
      touch-action: none;
      user-select: none;
    }
    .todo-divider::before {
      content: '';
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, transparent, #8b5cf6 8%, #8b5cf6 92%, transparent);
      border-radius: 999px;
    }
    .divider-placeholder {
      list-style: none;
      height: 12px;
      display: flex;
      align-items: center;
    }
    .divider-placeholder::before {
      content: '';
      flex: 1;
      height: 2px;
      border-radius: 999px;
      background: repeating-linear-gradient(90deg, #8b5cf6 0, #8b5cf6 6px, transparent 6px, transparent 10px);
      opacity: 0.45;
    }

    /* ── Bottom Bar ──────────────────────────────────────────────────────── */
    .bottom-bar {
      display: flex;
      justify-content: center;
      padding-top: 2px;
    }

    #clear-completed-btn {
      display: none;
      height: 36px;
      padding: 0 18px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: all 150ms ease, transform 100ms ease;
    }
    #clear-completed-btn:hover {
      background: var(--danger-soft);
      border-color: #fca5a5;
      color: var(--danger);
    }
    #clear-completed-btn:active { transform: scale(0.97); }

    /* ── Scrollbar ───────────────────────────────────────────────────────── */
    ::-webkit-scrollbar             { width: 4px; }
    ::-webkit-scrollbar-track       { background: transparent; }
    ::-webkit-scrollbar-thumb       { background: var(--border); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

    /* ── Mobile ──────────────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      body { padding: 16px 12px 80px; }
      header { padding: 18px 18px 16px; }
    }

  </style>
</head>
<body>

  <div class="container">

    <header>
      <div class="header-top">
        <div class="app-logo">✓</div>
        <h1>할일</h1>
      </div>
      <div class="progress-wrap">
        <div class="progress-track"><div id="progress-bar"></div></div>
        <span id="progress-text">0 / 0</span>
      </div>
    </header>

    <div class="input-row">
      <input id="todo-input" type="text" placeholder="새 할일 추가..." maxlength="100" autocomplete="off">
      <button id="add-btn">추가</button>
    </div>

    <ul id="todo-list"></ul>

    <div id="empty-state">
      <div class="empty-icon">📋</div>
      <p>할일이 없어요</p>
    </div>

    <div class="bottom-bar">
      <button id="clear-completed-btn">완료 항목 삭제</button>
    </div>

  </div>

<script>
// ─── StorageManager ───────────────────────────────────────────────────────────

class StorageManager {
  constructor(key = 'todos') { this.key = key; }

  save(todos) {
    try { localStorage.setItem(this.key, JSON.stringify(todos)); }
    catch (e) { console.error('[Storage] save:', e); }
  }

  load() {
    try { const r = localStorage.getItem(this.key); return r ? JSON.parse(r) : []; }
    catch (e) { console.error('[Storage] load:', e); return []; }
  }
}

// ─── TodoStore ────────────────────────────────────────────────────────────────

class TodoStore {
  #todos = [];
  #storage;

  constructor(storage = new StorageManager()) {
    this.#storage = storage;
    this.#todos = this.#storage.load();
  }

  #persist() { this.#storage.save(this.#todos); }

  getAll() { return [...this.#todos]; }

  add(text) {
    const todo = {
      id: `${Date.now()}-${Math.random().toString(36).slice(2)}`,
      text,
      done: false,
      createdAt: new Date().toISOString(),
    };
    this.#todos.push(todo);
    this.#persist();
    return todo;
  }

  update(id, changes) {
    const idx = this.#todos.findIndex(t => t.id === id);
    if (idx === -1) return null;
    const { id: _, createdAt: __, ...safe } = changes;
    this.#todos[idx] = { ...this.#todos[idx], ...safe };
    this.#persist();
    return this.#todos[idx];
  }

  remove(id) {
    this.#todos = this.#todos.filter(t => t.id !== id);
    this.#persist();
  }

  toggle(id) {
    const todo = this.#todos.find(t => t.id === id);
    if (!todo) return null;
    todo.done = !todo.done;
    this.#persist();
    return todo;
  }

  clearCompleted() {
    this.#todos = this.#todos.filter(t => !t.done);
    this.#persist();
  }

  // 드래그 순서 변경: DOM의 placeholder 인덱스를 그대로 받아서 처리
  moveTo(id, newIndex) {
    const idx = this.#todos.findIndex(t => t.id === id);
    if (idx === -1) return;
    const [item] = this.#todos.splice(idx, 1);
    this.#todos.splice(newIndex, 0, item);
    this.#persist();
  }

  getProgress() {
    const total = this.#todos.length;
    const done  = this.#todos.filter(t => t.done).length;
    return { total, done, percent: total === 0 ? 0 : Math.round((done / total) * 100) };
  }
}

// ─── Divider helpers ──────────────────────────────────────────────────────────

const getDividerIndex = () => {
  const v = localStorage.getItem('divider-index');
  return v === null ? 0 : parseInt(v, 10);
};
const setDividerIndex = i => localStorage.setItem('divider-index', String(i));

// ─── App ──────────────────────────────────────────────────────────────────────

class App {
  #store;
  #list    = document.getElementById('todo-list');
  #empty   = document.getElementById('empty-state');
  #bar     = document.getElementById('progress-bar');
  #barText = document.getElementById('progress-text');
  #input   = document.getElementById('todo-input');
  #clearBtn = document.getElementById('clear-completed-btn');
  #pendingEditId = null;

  constructor(store) { this.#store = store; }

  render() {
    this.#list.innerHTML = '';
    const todos = this.#store.getAll();

    if (todos.length === 0) {
      this.#empty.style.display = 'block';
    } else {
      this.#empty.style.display = 'none';
      const divIdx = getDividerIndex();
      todos.forEach((t, i) => {
        if (i === divIdx) this.#list.appendChild(this.#createDivider());
        this.#list.appendChild(this.#createCard(t));
      });
      if (divIdx >= todos.length) this.#list.appendChild(this.#createDivider());
    }

    const { total, done, percent } = this.#store.getProgress();
    this.#bar.style.width = `${percent}%`;
    this.#bar.classList.toggle('complete', percent === 100 && total > 0);
    this.#barText.textContent = `${done} / ${total}`;

    // 완료 항목이 있을 때만 삭제 버튼 표시
    this.#clearBtn.style.display = done > 0 ? 'block' : 'none';
  }

  #createCard(todo) {
    const li = document.createElement('li');
    li.className = `todo-card${todo.done ? ' done' : ''}`;
    li.dataset.id = todo.id;

    const handle = document.createElement('span');
    handle.className = 'drag-handle';
    handle.setAttribute('aria-hidden', 'true');
    handle.textContent = '⠿';

    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = todo.done;
    checkbox.dataset.action = 'toggle';
    checkbox.setAttribute('aria-label', todo.text);

    const span = document.createElement('span');
    span.className = 'todo-text';
    span.textContent = todo.text;

    const actions = document.createElement('div');
    actions.className = 'card-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'btn-edit';
    editBtn.dataset.action = 'edit';
    editBtn.setAttribute('aria-label', `${todo.text} 수정`);
    editBtn.textContent = '✏';

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'btn-delete';
    deleteBtn.dataset.action = 'delete';
    deleteBtn.setAttribute('aria-label', `${todo.text} 삭제`);
    deleteBtn.textContent = '✕';

    actions.append(editBtn, deleteBtn);
    li.append(handle, checkbox, span, actions);
    return li;
  }

  #createDivider() {
    const li = document.createElement('li');
    li.className = 'todo-divider';
    return li;
  }

  initEvents() {
    document.getElementById('add-btn').addEventListener('click', () => this.#addTodo());
    this.#input.addEventListener('keydown', e => { if (e.key === 'Enter') this.#addTodo(); });

    // 목록 클릭 위임
    this.#list.addEventListener('click', e => {
      const card = e.target.closest('.todo-card');
      if (!card) return;
      const { id } = card.dataset;
      const { action } = e.target.dataset;

      if (action === 'toggle') { this.#store.toggle(id); this.render(); }
      else if (action === 'delete') { this.#store.remove(id); this.render(); }
      else if (action === 'edit') { this.#enterEditMode(id); }
    });

    // 수정 중 다른 항목 수정 클릭 감지
    this.#list.addEventListener('mousedown', e => {
      const btn = e.target.closest('button[data-action="edit"]');
      if (!btn) return;
      const card = btn.closest('.todo-card');
      if (card) this.#pendingEditId = card.dataset.id;
    });

    this.#clearBtn.addEventListener('click', () => {
      if (confirm('완료된 항목을 모두 삭제할까요?')) {
        this.#store.clearCompleted();
        this.render();
      }
    });
  }

  #addTodo() {
    const text = this.#input.value.trim();
    if (!text) return;
    this.#store.add(text);
    this.#input.value = '';
    this.render();
  }

  #enterEditMode(id) {
    this.#pendingEditId = null;
    const card = this.#list.querySelector(`.todo-card[data-id="${id}"]`);
    if (!card) return;

    const span = card.querySelector('.todo-text');
    const original = span.textContent;

    const input = document.createElement('input');
    input.type = 'text';
    input.value = original;
    input.style.cssText = 'flex:1;min-width:0;border:1.5px solid #6366f1;border-radius:6px;padding:5px 10px;font-size:14.5px;outline:none;background:#fff;box-shadow:0 0 0 3px rgb(99 102 241/.12);font-family:inherit;';

    span.replaceWith(input);
    input.focus();
    input.select();

    const commit = () => {
      input.removeEventListener('blur', commit);
      const newText = input.value.trim();
      if (newText && newText !== original) this.#store.update(id, { text: newText });
      this.render();
      if (this.#pendingEditId) {
        const next = this.#pendingEditId;
        this.#pendingEditId = null;
        this.#enterEditMode(next);
      }
    };

    const cancel = () => {
      input.removeEventListener('blur', commit);
      input.replaceWith(span);
    };

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); commit(); }
      if (e.key === 'Escape') { cancel(); }
    });
  }
}

// ─── DragManager ──────────────────────────────────────────────────────────────

class DragManager {
  #store;
  #list;
  #onDone;
  #dragging = null;
  #dividerDrag = null;

  constructor(store, list, onDone) {
    this.#store = store;
    this.#list  = list;
    this.#onDone = onDone;
  }

  init() {
    this.#list.addEventListener('pointerdown', e => {
      const divider = e.target.closest('.todo-divider');
      if (divider) { e.preventDefault(); this.#startDivider(divider, e.clientY); return; }

      if (!e.target.closest('.drag-handle')) return;
      const card = e.target.closest('.todo-card');
      if (!card) return;
      e.preventDefault();
      this.#start(card, e.clientY);
    });

    document.addEventListener('pointermove', e => {
      if (this.#dragging)    { e.preventDefault(); this.#move(e.clientY); }
      if (this.#dividerDrag) { e.preventDefault(); this.#moveDivider(e.clientY); }
    }, { passive: false });

    document.addEventListener('pointerup', () => {
      if (this.#dragging)    this.#end();
      if (this.#dividerDrag) this.#endDivider();
    });

    document.addEventListener('pointercancel', () => {
      if (this.#dragging)    this.#abort();
      if (this.#dividerDrag) this.#abortDivider();
    });
  }

  #start(card, clientY) {
    const rect = card.getBoundingClientRect();

    const ghost = card.cloneNode(true);
    ghost.style.cssText = [
      `position:fixed`, `top:${rect.top}px`, `left:${rect.left}px`,
      `width:${rect.width}px`, `opacity:0.85`, `pointer-events:none`,
      `z-index:9999`, `border-radius:${getComputedStyle(card).borderRadius}`,
      `transform:scale(1.02) rotate(0.4deg)`,
      `box-shadow:0 16px 40px -4px rgb(0 0 0/.18),0 6px 16px -4px rgb(0 0 0/.10)`,
      `transition:none`,
    ].join(';');
    document.body.appendChild(ghost);

    const placeholder = document.createElement('li');
    placeholder.className = 'drag-placeholder';
    placeholder.style.height = `${rect.height}px`;
    card.replaceWith(placeholder);

    this.#dragging = {
      id: card.dataset.id,
      ghost,
      placeholder,
      offsetY: clientY - rect.top,
    };
  }

  #move(clientY) {
    const { ghost, placeholder, offsetY } = this.#dragging;
    ghost.style.top = `${clientY - offsetY}px`;

    // 엣지 근처 자동 스크롤
    const ZONE = 80, SPEED = 6;
    if      (clientY < ZONE)                      window.scrollBy(0, -SPEED);
    else if (clientY > window.innerHeight - ZONE) window.scrollBy(0,  SPEED);

    // 삽입 위치 계산 (todo-card 기준 — divider 제외)
    const cards = [...this.#list.querySelectorAll('.todo-card')];
    let insertBefore = null;
    for (const c of cards) {
      const { top, height } = c.getBoundingClientRect();
      if (clientY < top + height / 2) { insertBefore = c; break; }
    }

    if (insertBefore) this.#list.insertBefore(placeholder, insertBefore);
    else              this.#list.appendChild(placeholder);
  }

  #end() {
    const { id, ghost, placeholder } = this.#dragging;
    this.#dragging = null;

    // divider가 섞여 있으므로 todo-card 기준으로 인덱스 계산
    const children = [...this.#list.children];
    const pIdx = children.indexOf(placeholder);
    const newIndex = children.slice(0, pIdx).filter(el => el.classList.contains('todo-card')).length;
    ghost.remove();
    placeholder.remove();

    if (newIndex >= 0) this.#store.moveTo(id, newIndex);
    this.#onDone();
  }

  #abort() {
    const { ghost, placeholder } = this.#dragging;
    this.#dragging = null;
    ghost.remove();
    placeholder.remove();
    this.#onDone();
  }

  #startDivider(divider, clientY) {
    const rect = divider.getBoundingClientRect();

    const ghost = document.createElement('li');
    ghost.className = 'todo-divider';
    ghost.style.cssText = `position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;pointer-events:none;z-index:9999;opacity:0.7;`;
    document.body.appendChild(ghost);

    const placeholder = document.createElement('li');
    placeholder.className = 'divider-placeholder';
    divider.replaceWith(placeholder);

    this.#dividerDrag = { ghost, placeholder, offsetY: clientY - rect.top };
  }

  #moveDivider(clientY) {
    const { ghost, placeholder, offsetY } = this.#dividerDrag;
    ghost.style.top = `${clientY - offsetY}px`;

    const ZONE = 80, SPEED = 6;
    if      (clientY < ZONE)                      window.scrollBy(0, -SPEED);
    else if (clientY > window.innerHeight - ZONE) window.scrollBy(0,  SPEED);

    const cards = [...this.#list.querySelectorAll('.todo-card')];
    let insertBefore = null;
    for (const c of cards) {
      const { top, height } = c.getBoundingClientRect();
      if (clientY < top + height / 2) { insertBefore = c; break; }
    }

    if (insertBefore) this.#list.insertBefore(placeholder, insertBefore);
    else              this.#list.appendChild(placeholder);
  }

  #endDivider() {
    const { ghost, placeholder } = this.#dividerDrag;
    this.#dividerDrag = null;

    const children = [...this.#list.children];
    const pIdx = children.indexOf(placeholder);
    const newIndex = children.slice(0, pIdx).filter(el => el.classList.contains('todo-card')).length;

    ghost.remove();
    placeholder.remove();

    setDividerIndex(newIndex);
    this.#onDone();
  }

  #abortDivider() {
    const { ghost, placeholder } = this.#dividerDrag;
    this.#dividerDrag = null;
    ghost.remove();
    placeholder.remove();
    this.#onDone();
  }
}

// ─── 초기화 ───────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  const store = new TodoStore();
  const list  = document.getElementById('todo-list');
  const app   = new App(store);

  app.initEvents();
  new DragManager(store, list, () => app.render()).init();
  app.render();
});
</script>
</body>
</html>
